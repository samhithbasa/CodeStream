<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Register…</title>
    <script>
        const p = new URLSearchParams(window.location.search);
        let url = 'login.html?mode=register';
        p.forEach((v, k) => { if (k !== 'mode') url += `&${k}=${encodeURIComponent(v)}`; });
        window.location.replace(url);
    </script>
</head>

<body style="font-family:sans-serif;text-align:center;margin-top:50px;color:#666">
    Redirecting… <a href="login.html?mode=register">click here</a> if not redirected.
</body>

</html>
